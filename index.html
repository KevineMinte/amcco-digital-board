:root {

  --bg2: #181c27;
  --bg3: #1e2334;

/* Layout */

.sidebar-section{margin-bottom:4px;padding:0 12px;}

.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:all 0.15s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:rgba(61,126,255,0.15);color:var(--accent);}

.content{flex:1;padding:24px;overflow-x:hidden;max-width:1200px;}

/* Role selector */

.role-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:6px 30px 6px 10px;border-radius:8px;font-family:var(--font);font-size:13px;cursor:pointer;appearance:none;}

/* Section headers */

/* ============================================================
   SUPABASE API
   ============================================================ */
async function sbFetch(path, method='GET', body=null){
  const url = SUPABASE_URL.replace(/\/$/, '') + '/rest/v1/' + path;
  const opts = {
    method,
    headers:{
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      'X-Client-Info': 'amcco-board/1.0'
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if(!r.ok){
    const t = await r.text();
    console.error('SB error', r.status, t, 'URL:', url);
    throw new Error('SB '+r.status+': '+t);
  }
  if(r.status === 204) return [];
  const ct = r.headers.get('content-type')||'';
  if(ct.includes('json')) return r.json();
  return [];
}
const sbGet=(table,params='')=>sbFetch(table+(params?'?'+params:''));
const sbInsert=(table,data)=>sbFetch(table, 'POST', data);
const sbUpdate=(table,id,data)=>sbFetch(table+'?id=eq.'+id, 'PATCH', data);
const sbDelete=(table,id)=>sbFetch(table+'?id=eq.'+id, 'DELETE');

        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'X-Client-Info': 'amcco-board/1.0'
      }
    });
    console.log('Connection test status:', r.status);
    const body = await r.text();
    console.log('Response body:', body.substring(0,200));
    if(r.status === 401) throw new Error('Invalid API key — status 401: '+body.substring(0,100));
    if(r.status === 404) throw new Error('Table not found — run the SQL setup');
    if(r.status === 400) throw new Error('Bad request 400: '+body.substring(0,100));
    if(!r.ok) throw new Error('HTTP '+r.status+': '+body.substring(0,100));
    return true;
  } catch(e) {
    if(e.message.includes('fetch')) throw new Error('Cannot reach Supabase — network error: '+e.message);
    console.error('Connection test failed:', e.message);
    throw e;
  }
}

      <div style="font-size:32px;margin-bottom:12px;">⏳</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:8px;">Connecting to database...</div>
      <div style="font-size:12px;color:var(--text3);">Trying: ${SUPABASE_URL}</div>
    </div>`;

  try {
    await testConnection();
    await loadAll();
    await seedRecurringTasks();
  } catch(e) {
    console.error('Init load failed:', e);
    let reason = e.message || 'Unknown error';
    let tip = 'Check your Supabase URL and API key are correct, and that your project is active.';
    if(reason.includes('401')) tip = '❌ Invalid API key — double check the anon key in the HTML file.';
    if(reason.includes('404')) tip = '❌ Tables not found — make sure you ran the SQL setup script in Supabase.';
    if(reason.includes('Failed to fetch') || reason.includes('NetworkError')) tip = '❌ Cannot reach Supabase — check the URL ends in .supabase.co (not .com), and your internet connection.';
    if(reason.includes('403')) tip = '❌ Access denied — Row Level Security may be blocking access. Re-run the SQL setup script.';

    document.getElementById('content-area').innerHTML = `
      <div style="text-align:center;padding:60px 20px;max-width:500px;margin:0 auto;">
        <div style="font-size:36px;margin-bottom:16px;">🔴</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text);">Database connection failed</div>
        <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:14px;margin-bottom:16px;text-align:left;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">Error</div>
          <div style="font-size:13px;color:#fca5a5;font-family:var(--mono);">${reason}</div>
        </div>
        <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:16px;text-align:left;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">What to fix</div>
          <div style="font-size:13px;color:var(--text2);">${tip}</div>
        </div>
        <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:20px;text-align:left;">
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;">Your configured URL</div>
          <div style="font-size:12px;color:var(--text2);font-family:var(--mono);word-break:break-all;">${SUPABASE_URL}</div>
        </div>
        <button class="btn btn-primary" onclick="location.reload()">🔄 Try again</button>
      </div>`;
    return;
  }
  render();
  refreshInterval = setInterval(async()=>{
    try { await loadAll(); await seedRecurringTasks(); render(); updateSyncIndicator(); } catch(e){ console.warn('Refresh failed',e); }
  },60000);
}

async function loadAll(){
  const today = todayStr();
  const safe = async (fn) => { try { const r = await fn(); return r||[]; } catch(e){ console.warn('fetch failed',e); return []; } };
  const [tasks,intray,mutations,tomorrow,leads,social,content,kevinTasks,leaveData] = await Promise.all([
    safe(()=>sbGet('tasks','member_id=neq.Kevin&order=created_at.desc')),
    safe(()=>sbGet('intray','order=created_at.desc')),
    safe(()=>sbGet('mutations','date=eq.'+today+'&order=slot_time.asc')),
    safe(()=>sbGet('tomorrow_plans','date=eq.'+today+'&order=created_at.asc')),
    safe(()=>sbGet('leads_log','order=week_start.desc')),
    safe(()=>sbGet('social_metrics','order=week_start.desc')),
    safe(()=>sbGet('content_log','order=created_at.desc')),
    safe(()=>sbGet('tasks','member_id=eq.Kevin&order=created_at.desc')),
    safe(()=>sbGet('leave_log','order=date.desc'))
  ]);
  db.tasks = tasks;
  db.intray = intray;
  db.mutations = mutations;
  db.tomorrow = tomorrow;
  db.leads = leads;
  db.social = social;
  db.content = content;
  db.kevinTasks = kevinTasks;
  // Build on-leave lookup
  state.onLeave = {};
  (leaveData||[]).forEach(l=>{ if(!state.onLeave[l.date]) state.onLeave[l.date]={}; state.onLeave[l.date][l.member_id]=true; });
  updateIntrayBadge();
}

async function seedRecurringTasks(){
  const today = todayStr();
  const day = dayName();
  const existingNames = db.tasks.filter(t=>t.date===today).map(t=>t.task_name);

  const toInsert = [];
  for(const [memberId, tasks] of Object.entries(RECURRING)){
    for(const t of tasks){
      if(!existingNames.includes(t.task_name)){
        toInsert.push({ ...t, member_id:memberId, status:'todo', date:today, is_recurring:true });
      }
    }
  }
  // Susan's day-specific task
  if(SUSAN_DAY[day] && !existingNames.includes(SUSAN_DAY[day].task_name)){
    toInsert.push({ ...SUSAN_DAY[day], member_id:'Susan', status:'todo', date:today, is_recurring:true });
  }

  if(toInsert.length > 0){
    const res = await sbInsert('tasks', toInsert);
    if(res) db.tasks = [...db.tasks, ...res];
  }
}

function nowHHMM(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function dayName(){ return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()]; }

    <div class="progress-bar" style="margin-top:4px;"><div class="progress-fill" style="width:${pct}%;background:${color};"></div></div>
  </div>`;
}

function renderMutationSlots(){
  const now=nowHHMM();
  let html=`<div style="margin:10px 0;">
    <div class="section-title" style="margin-bottom:6px;">Mutation check-ins</div>
    <div class="mutation-grid">`;
  MUTATION_TIMES.forEach(time=>{
    const logged=db.mutations.find(m=>m.slot_time===time);
    const isPast=now>time;
    const isOverdue=isPast&&!logged;
    let cls='mutation-slot';
    let statusTxt='Pending';
    let icon='○';
    if(logged){ cls+= logged.no_change?' done-nc':' done-ok'; statusTxt=logged.no_change?'No change':'Updated'; icon=logged.no_change?'—':'✓'; }
    else if(isOverdue){ cls+=' overdue'; statusTxt='OVERDUE'; icon='!'; }
    else { cls+=' upcoming'; }
    const noteHtml=logged&&logged.notes?`<div class="mutation-note" title="${escHtml(logged.notes)}">${escHtml(logged.notes)}</div>`:'';
    const btn=(currentRole==='Bonface'&&!logged&&isPast)||(currentRole==='Bonface'&&now>=time&&now<(MUTATION_TIMES[MUTATION_TIMES.indexOf(time)+1]||'23:59'))
      ?`<button class="btn btn-ghost btn-sm" style="margin-top:4px;font-size:10px;" onclick="openMutationModal('${time}')">Log</button>`:'';
    html+=`<div class="${cls}">
      <div class="mutation-time">${time}</div>
      <div class="mutation-status" style="color:${logged?(logged.no_change?'var(--amber)':'var(--green)'):(isOverdue?'var(--red)':'var(--text3)')}">${icon} ${statusTxt}</div>
      ${noteHtml}${btn}
    </div>`;
  });
  html+=`</div></div>`;
  return html;
}

function checkMutationOverdue(){
  const now=nowHHMM();
  for(const t of MUTATION_TIMES){
    if(now>t){
      const logged=db.mutations.find(m=>m.slot_time===t);
      if(!logged) return `Bonface has a missed mutation check-in at ${t}.`;
    }
  }
  return null;
}

function getWeekLabel(){
  const d=new Date();
  const mon=new Date(d); const dow=d.getDay(); const diff=dow===0?-6:1-dow;
  mon.setDate(d.getDate()+diff);
  const fri=new Date(mon); fri.setDate(mon.getDate()+4);
  return mon.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+fri.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function calcTargetsHit(m){
  const tasks=db.tasks.filter(t=>t.member_id===m.id&&t.date===todayStr()&&t.status==='done');
  let hits=[];
  if(m.targets.ecards){ const n=tasks.filter(t=>t.task_type==='ecard').length; if(n>=m.targets.ecards) hits.push('eCards'); }
  if(m.targets.stories){ const n=tasks.filter(t=>t.task_type==='story').length; if(n>=m.targets.stories) hits.push('Stories'); }
  if(m.targets.shorts){ const n=tasks.filter(t=>t.task_type==='short').length; if(n>=m.targets.shorts) hits.push('Shorts'); }
  if(m.targets.longform){ const n=tasks.filter(t=>t.task_type==='longform').length; if(n>=m.targets.longform) hits.push('Long-form'); }
  return hits.length?hits.join(', '):'—';
}

/* ============================================================
   ON LEAVE TOGGLE
   ============================================================ */
async function toggleLeave(memberId, date){
  const isCurrentlyOnLeave = state.onLeave[date]?.[memberId];
  if(isCurrentlyOnLeave){
    // Remove leave — delete from DB
    await sbFetch('leave_log?member_id=eq.'+memberId+'&date=eq.'+date,'DELETE');
    if(state.onLeave[date]) delete state.onLeave[date][memberId];
  } else {
    // Mark on leave
    const res = await sbInsert('leave_log',{member_id:memberId, date, note:'On leave'});
    if(!state.onLeave[date]) state.onLeave[date]={};
    state.onLeave[date][memberId]=true;
  }
  showToast(isCurrentlyOnLeave?'Marked as back at work':'Marked as on leave','success');
  render();
}

let calendarDate = todayStr();

function renderCalendar(){
  const selDate = calendarDate;
  const selDateFmt = new Date(selDate).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Get all tasks and leave for selected date
  const allTasks = [...db.tasks,...db.kevinTasks].filter(t=>t.date===selDate);
  const leaveOnDay = state.onLeave[selDate]||{};
  const onLeaveMembers = MEMBERS.filter(m=>leaveOnDay[m.id]);
  const workingMembers = MEMBERS.filter(m=>!leaveOnDay[m.id]);

  let html=`<div class="section-header">
    <span class="section-title">Calendar — Day view</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
    <input type="date" class="form-control" style="width:auto;" value="${selDate}" onchange="calendarDate=this.value;render()"/>
    <span style="font-size:14px;font-weight:500;color:var(--text);">${selDateFmt}</span>
    ${selDate===todayStr()?'<span class="badge badge-done">Today</span>':''}
    <button class="btn btn-sm" onclick="calendarDate=todayStr();render()">Go to today</button>
  </div>`;

  // On leave banner
  if(onLeaveMembers.length){
    html+=`<div class="alert alert-warn" style="margin-bottom:16px;">🏖 On leave: ${onLeaveMembers.map(m=>m.name).join(', ')}</div>`;
  }

  // Summary metrics for selected day
  const done=allTasks.filter(t=>t.status==='done').length;
  const total=allTasks.length;
  html+=`<div class="metrics-grid" style="margin-bottom:20px;">
    <div class="metric"><div class="metric-label">Tasks on this day</div><div class="metric-val">${total}</div></div>
    <div class="metric"><div class="metric-label">Completed</div><div class="metric-val" style="color:var(--green);">${done}</div></div>
    <div class="metric"><div class="metric-label">Not done</div><div class="metric-val" style="color:var(--red);">${allTasks.filter(t=>t.status!=='done').length}</div></div>
    <div class="metric"><div class="metric-label">On leave</div><div class="metric-val" style="color:var(--amber);">${onLeaveMembers.length}</div></div>
  </div>`;

  // Per-member breakdown
  [...MEMBERS,{id:'Kevin',name:'Kevin (Digital Lead)',color:'#3d7eff',bg:'rgba(61,126,255,0.15)',initials:'KV'}].forEach(m=>{
    const mTasks = (m.id==='Kevin'?db.kevinTasks:db.tasks).filter(t=>t.member_id===m.id&&t.date===selDate);
    const onLeave = leaveOnDay[m.id];
    if(!mTasks.length && !onLeave) return;
    const mDone=mTasks.filter(t=>t.status==='done').length;
    html+=`<div class="card-sm" style="margin-bottom:10px;${onLeave?'opacity:0.6;':''}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div class="avatar" style="width:28px;height:28px;font-size:10px;background:${m.bg};color:${m.color};">${m.initials}</div>
        <span style="font-weight:600;font-size:13px;">${m.name}</span>
        ${onLeave?'<span style="font-size:11px;background:rgba(245,158,11,0.2);color:#f59e0b;padding:2px 8px;border-radius:99px;">🏖 On Leave</span>':''}
        <span style="margin-left:auto;font-size:12px;color:var(--text2);">${mDone}/${mTasks.length} done</span>
      </div>
      ${mTasks.map(t=>`<div style="font-size:12px;padding:3px 0;display:flex;align-items:center;gap:6px;">
        <span style="color:${t.status==='done'?'var(--green)':t.status==='blocked'?'var(--red)':'var(--text3)'};">${t.status==='done'?'✓':t.status==='blocked'?'!':'○'}</span>
        <span style="${t.status==='done'?'text-decoration:line-through;color:var(--text3);':''}">${escHtml(t.task_name)}</span>
        <span class="badge badge-${t.priority==='high'?'high':t.priority==='medium'?'medium':'low'}">${t.priority}</span>
        ${t.drive_link?`<a href="${escHtml(t.drive_link)}" target="_blank" class="task-link">🔗</a>`:''}
      </div>`).join('')}
    </div>`;
  });

  if(!allTasks.length && !onLeaveMembers.length){
    html+=`<div class="empty"><div class="empty-icon">📆</div>No activity recorded for this date.</div>`;
  }

  html+=`<div style="margin-top:16px;"><button class="btn" onclick="exportDayCSV('${selDate}')">⬇ Export this day</button></div>`;
  return html;
}

function calcPoints(m){
  const tasks=db.tasks.filter(t=>t.member_id===m.id&&t.date===todayStr());
  const done=tasks.filter(t=>t.status==='done');
  let pts=0;
  pts+=Math.min(30,done.length*POINTS_CONFIG.task_completed);
  pts+=Math.min(15,done.filter(t=>t.drive_link).length*POINTS_CONFIG.task_with_link);
  if(db.tomorrow.some(t=>t.member_id===m.id)) pts+=POINTS_CONFIG.preplanned;
  if(!tasks.some(t=>t.status==='blocked')) pts+=POINTS_CONFIG.no_blocked_overnight;
  if(m.targets.ecards){ const n=done.filter(t=>t.task_type==='ecard').length; if(n>=m.targets.ecards) pts+=POINTS_CONFIG.ecards_target; }
  if(m.targets.stories){ const n=done.filter(t=>t.task_type==='story').length; if(n>=m.targets.stories) pts+=POINTS_CONFIG.stories_target; }
  if(m.targets.shorts){ const n=done.filter(t=>t.task_type==='short').length; if(n>=m.targets.shorts) pts+=POINTS_CONFIG.shorts_target; }
  if(m.targets.longform){ const n=done.filter(t=>t.task_type==='longform').length; if(n>=m.targets.longform) pts+=POINTS_CONFIG.longform_target; }
  if(m.id==='Susan'){ if(tasks.some(t=>t.task_type==='leads'&&t.status==='done')) pts+=POINTS_CONFIG.leads_updated; if(tasks.some(t=>t.task_type==='content'&&t.status==='done')) pts+=POINTS_CONFIG.content_scheduled; }
  return Math.min(100,pts);
}

function getPointsBreakdown(m){
  const tasks=db.tasks.filter(t=>t.member_id===m.id&&t.date===todayStr());
  const done=tasks.filter(t=>t.status==='done').length;
  const links=tasks.filter(t=>t.drive_link&&t.status==='done').length;
  const planned=db.tomorrow.some(t=>t.member_id===m.id)?'✓ planned':'';
  return `${done} done · ${links} links · ${planned}`;
}

/* ============================================================

   ============================================================ */
function exportWeeklyCSV(){
  let rows=[['Member','Role','Tasks Planned','Tasks Done','Completion %','Targets Hit','Drive Links','Points']];
  MEMBERS.forEach(m=>{
    const tasks=db.tasks.filter(t=>t.member_id===m.id);
    const done=tasks.filter(t=>t.status==='done').length;
    const total=tasks.length;
    const pct=total?Math.round(done/total*100):0;
    rows.push([m.name,m.role,total,done,pct+'%',calcTargetsHit(m),tasks.filter(t=>t.drive_link).length,calcPoints(m)]);
  });
  downloadCSV(rows,'amcco-weekly-report-'+todayStr()+'.csv');
  showToast('Weekly report exported','success');
}

function exportMonthlyCSV(){
  let rows=[['=== AMCCO DIGITAL — MONTHLY REPORT ==='],[''],
    ['TEAM PERFORMANCE'],['Member','Tasks Done','Points','Targets Hit'],
    ...MEMBERS.map(m=>{
      const done=db.tasks.filter(t=>t.member_id===m.id&&t.status==='done').length;
      return [m.name,done,calcPoints(m),calcTargetsHit(m)];
    }),
    [''],['LEADS BY BRANCH'],['Week','Branch','Source','Count'],
    ...db.leads.map(l=>[l.week_start,l.branch,l.source,l.count]),
    [''],['SOCIAL MEDIA METRICS'],['Week',...PLATFORMS],
    ...db.social.map(s=>[s.week_start,...PLATFORMS.map(p=>s['p_'+slugify(p)]||0)]),
    [''],['TOP CONTENT'],['Title','Platform','Metric','Value','Link'],
    ...db.content.map(c=>[c.title,c.platform,c.metric_type,c.metric_value,c.post_link||''])
  ];
  downloadCSV(rows,'amcco-monthly-report-'+getMondayStr()+'.csv');
  showToast('Monthly report exported','success');
}

function exportHRReport(){
  let rows=[['=== AMCCO DIGITAL — HR PERFORMANCE REPORT ==='],['Generated:',new Date().toLocaleDateString('en-GB')],[''],
    ['Member','Role','Points (max 100)','Tasks Completed','Targets Hit','Work with Drive Links','Rating'],
    ...MEMBERS.map(m=>{
      const tasks=db.tasks.filter(t=>t.member_id===m.id);
      const done=tasks.filter(t=>t.status==='done').length;
      const pts=calcPoints(m);
      const rating=pts>=80?'Excellent':pts>=60?'Good':pts>=40?'Fair':'Needs attention';
      return [m.name,m.role,pts,done,calcTargetsHit(m),tasks.filter(t=>t.drive_link).length,rating];
    }),
    [''],['POINTS BREAKDOWN'],['Task completed on time','10 pts'],['Work submitted with Drive link','5 pts'],['Tomorrow pre-planned','10 pts'],['No blocked tasks','10 pts'],['Target bonuses','up to 20 pts']
  ];
  downloadCSV(rows,'amcco-hr-report-'+todayStr()+'.csv');
  showToast('HR report exported','success');
}

function downloadCSV(rows,filename){
  const csv=rows.map(r=>Array.isArray(r)?r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','):r).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

/* ============================================================
   UTILITIES
   ============================================================ */
function getMondayStr(){
  const d=new Date(); const dow=d.getDay(); const diff=dow===0?-6:1-dow;
  d.setDate(d.getDate()+diff); return d.toISOString().split('T')[0];
}
function slugify(s){ return s.toLowerCase().replace(/[^a-z0-9]/g,'_'); }
function escHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+type+' show';
  setTimeout(()=>t.className='toast',3000);
}
